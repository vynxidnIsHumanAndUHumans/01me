<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vynxidn</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

/* MATRIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
    opacity:0.2;
}

/* CENTER PERFECT */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    width:90%;
}

/* TEXT */
h1{font-size:38px;margin:10px}
h2{font-size:20px;margin:10px;opacity:0.8}
p{max-width:500px;margin:auto;opacity:0.7}

/* CURSOR */
.cursor{
    display:inline-block;
    width:10px;
    background:#00ffcc;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0}
}

/* MOBILE */
@media(max-width:600px){
    h1{font-size:28px}
}
</style>
</head>

<body>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<!-- AUDIO (NO UI) -->
<audio id="bgm" loop preload="auto" style="display:none">
    <source src="video.webm" type="audio/webm">
</audio>

<!-- CONTENT -->
<div class="container">
    <h1 id="line1"></h1>
    <h2 id="line2"></h2>
    <p id="line3"></p>
</div>

<script>

/* ================= AUDIO (NO UI) ================= */
document.addEventListener("click", ()=>{
    let audio = document.getElementById("bgm")
    audio.volume = 0.9
    audio.play().catch(()=>{})
}, {once:true})

/* ================= TYPING ================= */
function typeText(element, text, speed, callback){
    let i = 0
    function typing(){
        if(i < text.length){
            element.innerHTML += text.charAt(i)
            i++
            setTimeout(typing, speed)
        } else if(callback){
            callback()
        }
    }
    typing()
}

let l1 = document.getElementById("line1")
let l2 = document.getElementById("line2")
let l3 = document.getElementById("line3")

typeText(l1, "Hi, I am vynxidn", 60, ()=>{
    typeText(l2, "Welcome to my profile", 50, ()=>{
        typeText(l3, '"tetap rendah hati guys, yang tinggi soalnya langit"', 40)
    })
})

/* ================= MATRIX ================= */
let c=document.getElementById("matrix")
let ctx=c.getContext("2d")

function resize(){
    c.width=window.innerWidth
    c.height=window.innerHeight
}
resize()
window.addEventListener("resize", resize)

let letters="01"
letters=letters.split("")

let font=14
let columns=c.width/font
let drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)"
    ctx.fillRect(0,0,c.width,c.height)

    ctx.fillStyle="#0f0"
    ctx.font=font+"px monospace"

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)]
        ctx.fillText(text,i*font,drops[i]*font)

        if(drops[i]*font>c.height && Math.random()>0.95){
            drops[i]=0
        }
        drops[i]++
    }

    requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
