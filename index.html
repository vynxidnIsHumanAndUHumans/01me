<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vynxidn</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

/* MATRIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
    opacity:0.15;
}

/* CONTAINER */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:95%;
    max-width:800px;
}

/* TERMINAL BOX */
.terminal-box{
    border:1px solid #00ffcc;
    border-radius:10px;
    padding:15px;
    background:rgba(0,0,0,0.6);
    box-shadow:0 0 15px #00ffcc33;
}

/* TERMINAL TEXT */
#terminal{
    font-size:clamp(12px,2.5vw,15px);
    white-space:pre-wrap;
    overflow-y:auto;
    max-height:60vh;
    line-height:1.5;
}

/* SCROLL STYLE */
#terminal::-webkit-scrollbar{
    width:5px;
}
#terminal::-webkit-scrollbar-thumb{
    background:#00ffcc;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- AUDIO -->
<audio id="bgm" loop preload="auto">
    <source src="video.webm" type="audio/webm">
</audio>

<div class="container">
    <div class="terminal-box">
        <div id="terminal"></div>
    </div>
</div>

<script>

/* ================= AUDIO ================= */
let audio = document.getElementById("bgm")
let audioStarted = false

function startAudio(){
    if(!audioStarted){
        audioStarted = true
        audio.volume = 0.9
        audio.play().catch(()=>{})
    }
}

/* trigger saat user interaksi */
["click","touchstart","scroll","mousemove"].forEach(evt=>{
    document.addEventListener(evt, startAudio, {once:true})
})

/* ================= LOAD FILE ================= */
async function loadTextFile(){
    try{
        let res = await fetch("story.txt")
        return await res.text()
    }catch(e){
        return "gagal load story.txt..."
    }
}

/* ================= TYPING ================= */
function typeTerminal(element, text, speed){
    let i = 0

    function typing(){
        if(i < text.length){
            element.textContent += text.charAt(i)

            // auto scroll ke bawah
            element.scrollTop = element.scrollHeight

            i++
            setTimeout(typing, speed)
        }
    }

    typing()
}

/* ================= START ================= */
async function start(){
    let terminal = document.getElementById("terminal")
    terminal.textContent = ""

    let text = await loadTextFile()

    typeTerminal(terminal, text, 20)
}
start()

/* ================= MATRIX ================= */
let c=document.getElementById("matrix")
let ctx=c.getContext("2d")

function resize(){
    c.width=window.innerWidth
    c.height=window.innerHeight
}
resize()
window.addEventListener("resize", resize)

let letters="01".split("")
let font=14
let columns=Math.floor(c.width/font)
let drops=Array(columns).fill(1)

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)"
    ctx.fillRect(0,0,c.width,c.height)

    ctx.fillStyle="#0f0"
    ctx.font=font+"px monospace"

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.random()>0.5?0:1]
        ctx.fillText(text,i*font,drops[i]*font)

        if(drops[i]*font>c.height && Math.random()>0.95){
            drops[i]=0
        }
        drops[i]++
    }

    requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
