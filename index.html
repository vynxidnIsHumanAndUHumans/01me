<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vynxidn</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

/* MATRIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
    opacity:0.15;
}

/* CENTER */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    width:90%;
}

/* RESPONSIVE TEXT */
h1{
    font-size:clamp(24px, 5vw, 40px);
    margin:10px;
}

h2{
    font-size:clamp(14px, 3vw, 20px);
    margin:10px;
    opacity:0.8;
}

p{
    font-size:clamp(12px, 2.8vw, 16px);
    max-width:90%;
    margin:auto;
    opacity:0.7;
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:10px;
    background:#00ffcc;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- AUDIO -->
<audio id="bgm" loop preload="auto">
    <source src="video.webm" type="audio/webm">
</audio>

<div class="container">
    <h1 id="line1"></h1>
    <h2 id="line2"></h2>
    <p id="line3"></p>
</div>

<script>

/* ================= AUDIO ================= */
let audio = document.getElementById("bgm")
let audioStarted = false

function startAudio(){
    if(!audioStarted){
        audioStarted = true
        audio.volume = 0.9
        audio.play().catch(()=>{})
    }
}

/* ================= TYPING ================= */
function typeText(element, text, speed, triggerIndex, callback){
    let i = 0

    function typing(){
        if(i < text.length){

            element.innerHTML += text.charAt(i)

            // 🔥 trigger audio di huruf tertentu
            if(i === triggerIndex){
                startAudio()
            }

            i++
            setTimeout(typing, speed)

        } else if(callback){
            callback()
        }
    }

    typing()
}

/* ================= LOOP ================= */
function startTyping(){

    // reset text
    line1.innerHTML = ""
    line2.innerHTML = ""
    line3.innerHTML = ""

    typeText(line1, "Hi, I am vynxidn", 60, 6, ()=>{
        typeText(line2, "Welcome to my profile", 50, 5, ()=>{
            typeText(line3, '"tetap rendah hati guys, yang tinggi soalnya langit"', 40, 10, ()=>{

                // delay sebelum ulang
                setTimeout(startTyping, 2000)

            })
        })
    })
}

// mulai pertama kali
startTyping()

/* ================= BACKUP TRIGGER ================= */
["touchstart","touchmove","scroll","mousemove","click"].forEach(evt=>{
    document.addEventListener(evt, startAudio, {once:true})
})

/* ================= MATRIX ================= */
let c=document.getElementById("matrix")
let ctx=c.getContext("2d")

function resize(){
    c.width=window.innerWidth
    c.height=window.innerHeight
}
resize()
window.addEventListener("resize", resize)

let letters="01".split("")
let font=14
let columns=Math.floor(c.width/font)
let drops=Array(columns).fill(1)

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)"
    ctx.fillRect(0,0,c.width,c.height)

    ctx.fillStyle="#0f0"
    ctx.font=font+"px monospace"

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.random()>0.5?0:1]
        ctx.fillText(text,i*font,drops[i]*font)

        if(drops[i]*font>c.height && Math.random()>0.95){
            drops[i]=0
        }
        drops[i]++
    }

    requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
